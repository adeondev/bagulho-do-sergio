<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mundo Vivo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="game-container"></main>

<section id="hud-mini" aria-label="Resumo do mundo">
  <div class="hud-card">
    <span>Dia</span>
    <strong id="dia-mini">1</strong>
  </div>

  <div class="hud-card">
    <span>População</span>
    <strong id="populacao-mini">0</strong>
  </div>

  <div class="hud-card">
    <span>Era</span>
    <strong id="era-mini">-</strong>
  </div>

  <button id="btn-mini-dia" class="hud-btn">+1 dia</button>
  <button id="btn-mini-pause" class="hud-btn">Pausar</button>
  <button id="btn-toggle-panel" class="hud-btn destaque">Menu</button>
</section>

  <aside id="painel" aria-label="Painel da simulacao">
    <header class="painel-topo">
      <div>
        <p>Simulacao autonoma de IAs</p>
        <h1>Mundo Vivo</h1>
      </div>
      <div class="painel-acoes">
  <button id="btn-pause" class="btn-secundario" title="Pausar ou retomar com Esc">Pausar</button>
  <button id="btn-fechar-painel" class="btn-secundario btn-fechar" title="Fechar painel">×</button>
</div>
    </header>

    <section class="stats-grid" aria-label="Resumo">
      <div><span>Dia</span><strong id="dia">1</strong></div>
      <div><span>Populacao</span><strong id="populacao">0</strong></div>
      <div><span>Era</span><strong id="era">-</strong></div>
      <div><span>Estado</span><strong id="status-simulacao">Rodando</strong></div>
    </section>

    <div class="botoes-linha">
      <button id="btn-dia" class="btn-primario">Passar 1 dia</button>
      <button id="btn-salvar" class="btn-secundario">Salvar</button>
      <button id="btn-novo" class="btn-secundario" title="Apaga o save e gera um novo mundo">Novo</button>
    </div>

    <div class="botoes-linha camera-linha">
      <button id="btn-seguir" class="btn-secundario" title="Faz a camera seguir o habitante selecionado">Seguir</button>
      <button id="btn-aldeia" class="btn-secundario" title="Leva a camera para a aldeia inicial">Aldeia</button>
      <button id="btn-reduzir-painel" class="btn-secundario" title="Oculta ou mostra o painel lateral">Painel</button>
    </div>

    <section class="painel-secao">
      <h2>Controles</h2>
      <label class="campo">
        <span>Velocidade da simulacao</span>
        <div id="vel-controls" class="seg-controls">
          <button data-vel="1" class="seg-btn is-on">1x</button>
          <button data-vel="2" class="seg-btn">2x</button>
          <button data-vel="4" class="seg-btn">4x</button>
        </div>
      </label>
      <label class="campo">
        <span>IAs simultaneas: <em id="conc-valor">5</em></span>
        <input id="ia-concorrencia" type="range" min="1" max="8" step="1" value="5">
      </label>
    </section>

    <section class="painel-secao ia-config">
      <h2>IA</h2>
      <label class="campo">
        <span>Provedor</span>
        <select id="ia-provider">
          <option value="poolside">Poolside Laguna</option>
          <option value="puter">Puter GPT</option>
          <option value="instinto">Instinto local</option>
        </select>
      </label>
      <div id="poolside-fields" class="provider-fields">
        <label class="campo">
          <span>Poolside API key</span>
          <input id="poolside-api-key" type="password" autocomplete="off" placeholder="pk_...">
        </label>
        <label class="campo">
          <span>Modelo Poolside</span>
          <input id="poolside-model" type="text" autocomplete="off" value="poolside/laguna-xs.2">
        </label>
      </div>
      <div id="puter-fields" class="provider-fields">
        <label class="campo">
          <span>Modelo Puter</span>
          <input id="puter-model" type="text" autocomplete="off" value="gpt-5-nano">
        </label>
      </div>
      <button id="btn-save-ia" class="btn-secundario">Salvar IA</button>
      <p id="ia-status" class="ia-status">Instinto local mantem o mundo vivo se a IA falhar.</p>
    </section>

    <section class="painel-secao">
      <h2>Tribos</h2>
      <div id="lista-tribos" class="lista-tribos"></div>
      <p id="estruturas-resumo" class="resumo-estruturas"></p>
    </section>

    <section class="painel-secao">
      <h2>Habitantes</h2>
      <div id="lista-habitantes" class="lista-habitantes"></div>
    </section>

<section id="secao-detalhe" class="painel-secao detalhe-secao">
  <h2>Detalhe</h2>
  <div id="info-habitante">
    <div class="empty-state">Clique em um habitante.</div>
  </div>
</section>

    <section class="painel-secao">
      <h2>Eventos</h2>
      <div id="eventos" aria-live="polite"></div>
    </section>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
  <script type="module" src="./src/game.js"></script>
</body>
</html>
